<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thomas' treningslogg Pro 💪🐾</title>
    
    <!-- Henter Tailwind CSS for styling og grafikk -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Henter React slik at logikken fungerer direkte i nettleseren -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Henter Canvas Confetti for "Ny Pers" feiring! 🎉 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            /* Her er hundebildet ditt! */
            background: url('bedlington.jpg') no-repeat center center fixed; 
            background-color: #1e293b;
            background-size: cover;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Hindrer pull-to-refresh på mobil for mer app-følelse */
            overscroll-behavior-y: none; 
        }
        
        /* Skjuler scrollbar, men lar deg scrolle */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Enkel animasjon for "Ny Pers" */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Glattere overgang på grafen */
        .chart-bar {
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Ikoner ---
        const Play = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Pause = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const RotateCcw = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
        const Calendar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const CheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const ChevronRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const Clock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const ArrowLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const BarChart = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;

        // Google Sheets Webhook for Thomas
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4uPV4nt98q4WdNB35VVkwJPqaiX5kXLQK5VMK3ZNsQ9jlSTSXg_0-S9H1jiqRiOFJ1w/exec';

        // --- Treningsdata for Thomas ---
        const WORKOUTS = [
          {
            id: 'dag-1',
            title: 'Dag 1: Beinpress (+ Trekk)',
            description: 'Tung beinpress, benkpress og frontpress. Lagt til kabelroing for rygg.',
            exercises: [
              { id: 'tm1', name: 'Magen', sets: 3, reps: '30', rest: 60, desc: 'Valgfri (Situps/Benhev).' },
              { id: 'tm2', name: 'Rygghev', sets: 3, reps: '12-15', rest: 60, desc: 'Hold vektskive inntil brystet.' },
              { id: 'tm3_bp', name: 'Beinpress i Maskin (TUNG)', sets: 5, reps: '1x8, 2x6, 2x5', rest: 120, desc: 'Plasser føttene høyt på platen for å skåne knærne.' },
              { id: 'tm4', name: 'Benkpress m/stopp', sets: 6, reps: '2x6, 2x5, 2x3', rest: 120, desc: '1 sek stopp på brystet.' },
              { id: 'tm5', name: 'Sittende Lårcurl', sets: 3, reps: '12', rest: 90, desc: 'Isolert bakside lår - snilt for kneet.' },
              { id: 'tm6', name: 'Frontpress', sets: 5, reps: '1x6, 2x5, 2x4', rest: 90, desc: 'Stående skulderpress.' },
              { id: 'new_pull1', name: 'Sittende kabelroing', sets: 3, reps: '8-12', rest: 90, desc: 'NY: Horisontalt trekk for midtre rygg og holdning.' }
            ]
          },
          {
            id: 'dag-2',
            title: 'Dag 2: Isolasjon Bein (+ Trekk)',
            description: 'Isolasjon for bein og mer benkpress. Lagt til nedtrekk og face pulls.',
            exercises: [
              { id: 'to1', name: 'Magen', sets: 3, reps: '20', rest: 60, desc: 'Kontrollert.' },
              { id: 'to2', name: 'Rygghev', sets: 3, reps: '10-12', rest: 60, desc: 'Litt tyngre.' },
              { id: 'to3_le', name: 'Leg Extension (Beinspark)', sets: 3, reps: '10-12', rest: 90, desc: 'Isolerer fremside lår uten at hoften/korsryggen belastes.' },
              { id: 'to4', name: 'Benkpress m/stopp', sets: 7, reps: '1x8, 2x6, 2x5, 2x4', rest: 120, desc: 'Husk stopp.' },
              { id: 'to5_lc', name: 'Liggende Lårcurl', sets: 4, reps: '8-10', rest: 90, desc: 'Isolert bakside lår. Veldig god og skånsom erstatning for markløft.' },
              { id: 'new_pull2', name: 'Nedtrekk (eller Pull-ups)', sets: 3, reps: '8-10', rest: 90, desc: 'NY: Vertikalt trekk for bredde i ryggen.' },
              { id: 'new_pull3', name: 'Face pulls', sets: 3, reps: '12-15', rest: 60, desc: 'NY: For bakside skulder, ekstremt bra for skulderhelse!' }
            ]
          },
          {
            id: 'dag-3',
            title: 'Dag 3: Glutes & Bryst (+ Trekk)',
            description: 'Fokus på setemuskler og smal benkpress. Lagt til stangroing.',
            exercises: [
              { id: 'tf1', name: 'Magen', sets: 3, reps: '25', rest: 60, desc: 'Kjernefokus.' },
              { id: 'tf2', name: 'Rygghev', sets: 3, reps: '8-10', rest: 60, desc: 'Ukens tyngste.' },
              { id: 'tf3_ebp', name: 'Ettbeins Beinpress', sets: 3, reps: '8 per bein', rest: 90, desc: 'Fokus på jevn styrke og kontrollert bevegelse.' },
              { id: 'tf4', name: 'Smal benkpress', sets: 6, reps: '1x6, 2x5, 3x4', rest: 120, desc: 'Skulderbredde.' },
              { id: 'tf5_ht', name: 'Hip Thrust (Maskin/Smith)', sets: 4, reps: '6-8', rest: 120, desc: 'Skånsomt for korsrygg og knær, men trener setemusklene kraftig.' },
              { id: 'tf6', name: 'Skulderpress', sets: 5, reps: '4-6', rest: 90, desc: 'Nakkevennlig.' },
              { id: 'new_pull4', name: 'Stående stangroing', sets: 3, reps: '8-10', rest: 90, desc: 'NY: Tykkelse i ryggen og balanserende for all brysttreningen.' }
            ]
          }
        ];

        // --- Komponent for hver enkelt øvelse (Håndterer historikk og logging) ---
        const ExerciseCard = ({ exercise, activeWorkoutId, completedSets, toggleSet, startTimer }) => {
          const histKey = `nsf_final_${exercise.id}`; // Beholder gammel nøkkel for bakoverkompatibilitet
          
          const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem(histKey)) || []);
          // Hent forrige raw input hvis tilgjengelig, ellers kun vekt.
          const [weightInput, setWeightInput] = useState(history.length > 0 ? (history[0].rawWeight || history[0].weight) : '');
          const [showHistory, setShowHistory] = useState(false);
          const [showSavedMsg, setShowSavedMsg] = useState(false);
          const [showPersMsg, setShowPersMsg] = useState(false);

          const saveWeight = () => {
            if (!weightInput) return;
            
            // SMART PARSING: Finn alle tall for å støtte e.g. "80 - 90 - 100" eller "80, 90, 100"
            const normalizedInput = weightInput.toString().replace(/,/g, '.');
            const numbersFound = normalizedInput.match(/\d+(\.\d+)?/g);
            
            if (!numbersFound) return; // Fant ingen tall
            
            // Henter ut toppvekten som ble skrevet inn for graf og pers!
            const topWeightVal = Math.max(...numbersFound.map(Number));
            const dateShort = new Date().toLocaleDateString('no-NO', {day:'2-digit', month:'2-digit'});
            let newHistory = [...history];

            // Sjekk for ny pers basert på toppvekt!
            const oldMax = history.length > 0 ? Math.max(...history.map(h => h.weight)) : 0;
            
            // PRO-TIPS: Ekte Konfetti for Ny Pers! 🎉
            if (topWeightVal > oldMax && history.length > 0) {
                setShowPersMsg(true);
                setTimeout(() => setShowPersMsg(false), 5000);
                
                // Avfyr konfetti! Blå/Indigo tema for Thomas
                if (window.confetti) {
                    window.confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#4f46e5', '#3b82f6', '#10b981'], // Indigo, Blå, Grønn
                        zIndex: 9999
                    });
                }
            }

            // Oppdater logg for i dag, ellers lag ny oppføring
            if (newHistory.length > 0 && newHistory[0].date === dateShort) {
                newHistory[0].weight = topWeightVal;
                newHistory[0].rawWeight = weightInput.toString(); // Lagrer tekststrengen brukeren skrev
            } else {
                newHistory.unshift({ 
                    weight: topWeightVal, 
                    rawWeight: weightInput.toString(), 
                    date: dateShort 
                });
            }
            
            newHistory = newHistory.slice(0, 15); // Behold kun siste 15
            setHistory(newHistory);
            localStorage.setItem(histKey, JSON.stringify(newHistory));
            
            // Google Sheets kobling for Thomas
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ exercise: exercise.name, weight: weightInput.toString() }) 
            }).catch(err => console.log("Kunne ikke sende til ark:", err));
            
            setShowSavedMsg(true);
            setTimeout(() => setShowSavedMsg(false), 2000);
          };

          // For graf-utregning
          const maxWeight = history.length > 0 ? Math.max(...history.map(h => h.weight)) : 10;
          const minWeight = history.length > 0 ? Math.min(...history.map(h => h.weight)) : 0;

          return (
            <div className="bg-white/90 backdrop-blur-md rounded-2xl p-5 shadow-md border border-white/50 relative overflow-hidden">
              
              {/* Notifikasjoner */}
              {showPersMsg && (
                <div className="absolute top-3 right-3 bg-yellow-400 text-yellow-900 font-bold px-3 py-1 rounded-full text-xs shadow-lg flex items-center gap-1 animate-pop z-10 border border-yellow-300">
                  🌟 NY PERS!
                </div>
              )}
              {showSavedMsg && !showPersMsg && (
                <div className="absolute top-3 right-3 bg-emerald-500 text-white font-bold px-3 py-1 rounded-full text-xs shadow flex items-center gap-1 animate-pop z-10">
                  ✅ Lagret
                </div>
              )}

              <div className="flex justify-between items-start mb-4">
                <div className="pr-12">
                  <h3 className="text-xl font-bold text-slate-900">{exercise.name}</h3>
                  <p className="text-sm font-bold text-indigo-600 mt-1">
                    {exercise.sets} sett | Reps: {exercise.reps}
                  </p>
                  {exercise.desc && (
                    <p className="text-sm text-slate-700 font-medium mt-2 bg-white/50 p-3 rounded-lg border border-white/60 leading-relaxed shadow-sm">
                      💡 {exercise.desc}
                    </p>
                  )}
                </div>
                {exercise.rest > 0 && (
                  <button 
                    onClick={() => startTimer(exercise.rest)}
                    className="flex items-center gap-1.5 text-xs font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-3 py-2.5 rounded-lg transition-colors shadow-sm whitespace-nowrap active:scale-95"
                  >
                    <Clock className="w-4 h-4" />
                    {exercise.rest}s
                  </button>
                )}
              </div>

              {/* Set-avkrysning */}
              <div className="flex flex-wrap gap-3 mt-4">
                {Array.from({ length: exercise.sets }).map((_, i) => {
                  const isChecked = completedSets[`${activeWorkoutId}-${exercise.id}-${i}`];
                  return (
                    <button
                      key={i}
                      onClick={() => toggleSet(exercise.id, i)}
                      className={`w-12 h-12 rounded-xl text-lg font-bold flex items-center justify-center transition-all shadow-sm ${
                        isChecked 
                          ? 'bg-emerald-500 text-white shadow-inner shadow-emerald-700/20 scale-95 border-none' 
                          : 'bg-white/90 text-slate-600 hover:bg-indigo-50 border-2 border-slate-300'
                      }`}
                    >
                      {isChecked ? <CheckCircle className="w-6 h-6" /> : i + 1}
                    </button>
                  );
                })}
              </div>

              {/* Input for Vekt og Lagring */}
              <div className="flex gap-2 mt-5 relative">
                <input 
                  type="text" 
                  inputMode="text"
                  placeholder="F.eks: 80 - 90 - 100"
                  value={weightInput}
                  onChange={(e) => setWeightInput(e.target.value)}
                  className="flex-1 bg-white/90 border-2 border-slate-300 text-slate-900 font-bold rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all shadow-sm"
                />
                <button 
                  onClick={saveWeight}
                  className="bg-slate-800 hover:bg-slate-900 text-white font-bold px-6 py-3 rounded-xl transition-all shadow-md active:scale-95"
                >
                  Lagre
                </button>
              </div>

              {/* Logg & Graf-knapp */}
              <div className="mt-4 pt-4 border-t border-slate-200 flex justify-between items-center">
                <button 
                  onClick={() => setShowHistory(!showHistory)}
                  className="flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-indigo-600 bg-white/50 px-3 py-1.5 rounded-lg border border-slate-300 transition-colors"
                >
                  <BarChart className="w-4 h-4" />
                  {showHistory ? 'Skjul logg' : 'Logg & Graf 📊'}
                </button>
                <span className="text-xs font-semibold text-slate-500">
                  {history.length > 0 ? `Sist: ${history[0].date}` : 'Ingen logg enda'}
                </span>
              </div>

              {/* Utbrettbar Historikk & Graf */}
              {showHistory && (
                <div className="mt-4 bg-white/70 rounded-xl p-4 border border-slate-200 shadow-inner animate-in fade-in slide-in-from-top-2 duration-300">
                  {history.length > 0 ? (
                    <>
                      {/* Graf-tegner - Bruker h.weight (den høyeste toppen) */}
                      {history.length > 1 && (
                        <div className="flex items-end gap-1.5 h-32 mb-6 pt-2 border-b border-slate-300 pb-1">
                          {history.slice(0, 10).reverse().map((h, idx) => {
                            const heightPercent = maxWeight === minWeight ? 50 : 25 + ((h.weight - minWeight) / (maxWeight - minWeight)) * 75;
                            return (
                              <div key={idx} className="flex-1 flex flex-col items-center justify-end group relative h-full">
                                <div 
                                  className="w-full bg-indigo-400 rounded-t-sm chart-bar hover:bg-indigo-500 relative" 
                                  style={{ height: `${heightPercent}%` }}
                                >
                                  {/* Tooltip */}
                                  <div className="absolute -top-7 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs font-bold py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-20 pointer-events-none shadow-lg">
                                    Topp: {h.weight}
                                  </div>
                                </div>
                                <span className="text-[9px] font-medium text-slate-500 mt-1 truncate w-full text-center">
                                  {h.date.split('.')[0]}/{h.date.split('.')[1]}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                      
                      {/* Liste over økter - Viser rawWeight slik at man ser alle datasettene ("80 - 90 - 100") */}
                      <div className="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                        {history.map((h, i) => (
                          <div key={i} className="flex justify-between items-center text-sm border-b border-slate-200/60 pb-2">
                            <span className="text-slate-600 font-medium">{h.date}</span>
                            <span className="font-bold text-slate-800 bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200">
                                {h.rawWeight || h.weight} kg
                            </span>
                          </div>
                        ))}
                      </div>
                    </>
                  ) : (
                    <div className="text-center py-6 text-slate-500 font-medium text-sm">
                      Ingen data lagret for denne øvelsen enda.
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        };

        // --- Hovedappen ---
        function App() {
          const [activeWorkoutId, setActiveWorkoutId] = useState(() => localStorage.getItem('thomas_active_workout') || null);
          const [workoutHistory, setWorkoutHistory] = useState(() => {
            const saved = localStorage.getItem('thomas_workout_history');
            return saved ? JSON.parse(saved) : {};
          });
          
          const [timeLeft, setTimeLeft] = useState(0);
          const [isTimerRunning, setIsTimerRunning] = useState(false);
          const [timerMax, setTimerMax] = useState(90);
          
          const [completedSets, setCompletedSets] = useState(() => {
            const saved = localStorage.getItem('thomas_completed_sets');
            return saved ? JSON.parse(saved) : {};
          });

          useEffect(() => {
            localStorage.setItem('thomas_workout_history', JSON.stringify(workoutHistory));
          }, [workoutHistory]);

          // NYTT: Lagrer aktiv økt og grønne prikker i minnet fortløpende
          useEffect(() => {
            if (activeWorkoutId) {
                localStorage.setItem('thomas_active_workout', activeWorkoutId);
            } else {
                localStorage.removeItem('thomas_active_workout');
            }
          }, [activeWorkoutId]);

          useEffect(() => {
            localStorage.setItem('thomas_completed_sets', JSON.stringify(completedSets));
          }, [completedSets]);

          // PRO-TIPS: Forbedret Timer med Vibrasjon
          useEffect(() => {
            let intervalId;
            if (isTimerRunning && timeLeft > 0) {
              intervalId = setInterval(() => {
                setTimeLeft((prev) => prev - 1);
              }, 1000);
            } else if (timeLeft === 0 && isTimerRunning) {
              setIsTimerRunning(false);
              // Taktil tilbakemelding: Vibrer telefonen når pausen er over! 📳
              if (navigator.vibrate) {
                  navigator.vibrate([300, 150, 300, 150, 500]);
              }
            }
            return () => clearInterval(intervalId);
          }, [isTimerRunning, timeLeft]);

          const startTimer = (seconds) => {
            setTimeLeft(seconds);
            setTimerMax(seconds);
            setIsTimerRunning(true);
          };

          const toggleTimer = () => {
            if (timeLeft > 0) setIsTimerRunning(!isTimerRunning);
          };

          const resetTimer = () => {
            setIsTimerRunning(false);
            setTimeLeft(timerMax);
          };

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
          };

          const toggleSet = (exerciseId, setIndex) => {
            const key = `${activeWorkoutId}-${exerciseId}-${setIndex}`;
            setCompletedSets(prev => ({
              ...prev,
              [key]: !prev[key]
            }));
          };

          const finishWorkout = () => {
            const today = new Date().toLocaleDateString('no-NO', { 
              weekday: 'long', 
              year: 'numeric', 
              month: 'long', 
              day: 'numeric' 
            });
            
            setWorkoutHistory(prev => ({
              ...prev,
              [activeWorkoutId]: today
            }));
            
            setCompletedSets({});
            setActiveWorkoutId(null);
            // NYTT: Sletter den midlertidige hukommelsen når økten er ferdig
            localStorage.removeItem('thomas_active_workout');
            localStorage.removeItem('thomas_completed_sets');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const activeWorkout = WORKOUTS.find(w => w.id === activeWorkoutId);

          if (!activeWorkoutId) {
            return (
              <div className="min-h-screen bg-slate-900/30 text-slate-900 p-4 md:p-8 backdrop-blur-sm flex flex-col">
                <div className="max-w-2xl mx-auto pt-6 flex-grow w-full">
                  <header className="mb-8 text-center md:text-left bg-white/80 p-6 rounded-2xl shadow-lg backdrop-blur-md border border-white/60">
                    <h1 className="text-3xl font-black text-slate-900 mb-2 tracking-tight">Thomas' treningslogg <span className="text-indigo-500">Pro</span> 💪🐾</h1>
                    <p className="text-slate-700 font-medium">Velg dagens økt og spor fremgangen din.</p>
                  </header>

                  <div className="space-y-4 mb-8">
                    {WORKOUTS.map((workout) => (
                      <button
                        key={workout.id}
                        onClick={() => setActiveWorkoutId(workout.id)}
                        className="w-full bg-white/80 p-6 rounded-2xl shadow-md border border-white/60 hover:bg-white hover:scale-[1.02] hover:shadow-xl transition-all duration-300 text-left group flex flex-col md:flex-row md:items-center justify-between backdrop-blur-md"
                      >
                        <div>
                          <h2 className="text-xl font-bold text-indigo-600 mb-1 group-hover:text-indigo-700 transition-colors">{workout.title}</h2>
                          <p className="text-slate-700 text-sm mb-3 md:mb-0 font-medium">{workout.description}</p>
                        </div>
                        
                        <div className="flex items-center gap-4 text-sm mt-2 md:mt-0">
                          {workoutHistory[workout.id] ? (
                            <div className="flex items-center text-emerald-800 bg-emerald-100/90 px-3 py-1.5 rounded-full font-bold shadow-sm">
                              <CheckCircle className="w-4 h-4 mr-1.5" />
                              Sist: {workoutHistory[workout.id].split(',')[0]}
                            </div>
                          ) : (
                            <div className="flex items-center text-slate-600 bg-slate-200/80 px-3 py-1.5 rounded-full font-medium shadow-sm">
                              <Calendar className="w-4 h-4 mr-1.5" />
                              Ikke registrert
                            </div>
                          )}
                          <ChevronRight className="w-5 h-5 text-indigo-400 group-hover:text-indigo-600 transition-colors hidden md:block" />
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-900/30 text-slate-900 pb-32">
              <div className="bg-white/70 backdrop-blur-md border-b border-white/40 sticky top-0 z-30 shadow-sm">
                <div className="max-w-2xl mx-auto p-4 flex items-center justify-between">
                  <button 
                    onClick={() => setActiveWorkoutId(null)}
                    className="p-2 hover:bg-white/60 rounded-full transition-colors flex items-center text-slate-800 font-bold active:scale-95"
                  >
                    <ArrowLeft className="w-5 h-5 mr-1" />
                    <span className="hidden md:inline font-medium">Tilbake</span>
                  </button>
                  <h2 className="text-lg font-black text-slate-900 truncate px-4">{activeWorkout.title}</h2>
                  <div className="w-20"></div>
                </div>
              </div>

              <div className="max-w-2xl mx-auto p-4 space-y-6 mt-4">
                {activeWorkout.exercises.map((exercise) => (
                  <ExerciseCard 
                    key={exercise.id} 
                    exercise={exercise} 
                    activeWorkoutId={activeWorkoutId}
                    completedSets={completedSets}
                    toggleSet={toggleSet}
                    startTimer={startTimer}
                  />
                ))}

                <button 
                  onClick={finishWorkout}
                  className="w-full mt-8 bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-black text-lg py-5 rounded-2xl shadow-xl hover:shadow-2xl transition-all flex items-center justify-center gap-2 border border-indigo-400 active:scale-[0.98]"
                >
                  <CheckCircle className="w-6 h-6" />
                  Registrer og avslutt økt
                </button>
              </div>

              {/* Flytende Timer m/ Visuell Progress */}
              {(timeLeft > 0 || isTimerRunning) && (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/95 backdrop-blur-xl text-white rounded-2xl shadow-2xl p-4 flex items-center justify-between border border-slate-700 z-50 overflow-hidden">
                  
                  {/* Visuell Progress Bar i bakgrunnen */}
                  <div 
                    className="absolute bottom-0 left-0 h-1 bg-indigo-500 transition-all duration-1000 ease-linear"
                    style={{ width: `${(timeLeft / timerMax) * 100}%` }}
                  />

                  <div className="flex items-center gap-3 relative z-10">
                    <div className={`text-3xl font-mono font-black ${timeLeft === 0 ? 'text-rose-400 animate-pulse' : 'text-indigo-400'}`}>
                      {formatTime(timeLeft)}
                    </div>
                    <div className="text-xs text-slate-300 font-bold uppercase tracking-wider">
                      {timeLeft === 0 ? 'Ferdig!' : 'Hvile'}
                    </div>
                  </div>
                  
                  <div className="flex gap-2 relative z-10">
                    <button 
                      onClick={toggleTimer}
                      className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-colors shadow-sm active:scale-95"
                    >
                      {isTimerRunning ? <Pause className="w-5 h-5 text-white" /> : <Play className="w-5 h-5 text-white" />}
                    </button>
                    <button 
                      onClick={resetTimer}
                      className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-colors shadow-sm active:scale-95"
                    >
                      <RotateCcw className="w-5 h-5 text-white" />
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
